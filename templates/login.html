{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:600px">

<h2>Founder Login</h2>

<form method="POST">

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<button class="btn btn-success w-100">

Login

</button>

</form>

</div>

{% endblock %}
