{% extends "base.html" %}

{% block title %}Founder Assessment{% endblock %}

{% block content %}

<h2 class="mb-4 text-center">Founder Assessment</h2>

<div class="progress mb-4" style="height:10px;">
    <div class="progress-bar" style="width:25%" id="progressBar"></div>
</div>

<form method="POST">

<!-- STEP 1 -->

<div id="step1" class="step">

    <h4>Step 1 - Personal Information</h4>

    <input class="form-control mb-3" name="name" placeholder="Full Name" required>

    <input class="form-control mb-3" type="number" name="age" placeholder="Age" required>

    <select class="form-select mb-3" name="education">
        <option>School</option>
        <option>Diploma</option>
        <option>Bachelor's Degree</option>
        <option>Master's Degree</option>
        <option>PhD</option>
    </select>

    <input class="form-control mb-4" name="occupation" placeholder="Occupation">

    <button type="button" class="btn btn-primary" onclick="nextStep()">
        Next →
    </button>

</div>

<!-- STEP 2 -->

<div id="step2" class="step">

    <h4>Step 2 - Startup Information</h4>

    <input class="form-control mb-3" type="number" name="budget" placeholder="Budget">

    <input class="form-control mb-3" type="number" name="team_size" placeholder="Team Size">

    <select class="form-select mb-4" name="startup_stage">
        <option>Idea</option>
        <option>Prototype</option>
        <option>MVP</option>
        <option>Early Revenue</option>
        <option>Scaling</option>
    </select>

    <button type="button" class="btn btn-secondary" onclick="previousStep()">
        ← Back
    </button>

    <button type="button" class="btn btn-primary" onclick="nextStep()">
        Next →
    </button>

</div>

<!-- STEP 3 -->

<div id="step3" class="step">

    <h4>Step 3 - Skills</h4>

    <input class="form-control mb-2" type="number" min="1" max="10" name="programming" placeholder="Programming">

    <input class="form-control mb-2" type="number" min="1" max="10" name="marketing" placeholder="Marketing">

    <input class="form-control mb-2" type="number" min="1" max="10" name="finance" placeholder="Finance">

    <input class="form-control mb-2" type="number" min="1" max="10" name="leadership" placeholder="Leadership">

    <input class="form-control mb-2" type="number" min="1" max="10" name="communication" placeholder="Communication">

    <input class="form-control mb-2" type="number" min="1" max="10" name="problem_solving" placeholder="Problem Solving">

    <input class="form-control mb-4" type="number" min="1" max="10" name="risk_tolerance" placeholder="Risk Tolerance">

    <button type="button" class="btn btn-secondary" onclick="previousStep()">
        ← Back
    </button>

    <button type="button" class="btn btn-primary" onclick="nextStep()">
        Next →
    </button>

</div>

<!-- STEP 4 -->

<div id="step4" class="step">

    <h4>Ready?</h4>

    <p>Click below to let FoundrAI analyze your profile.</p>

    <button type="button" class="btn btn-secondary" onclick="previousStep()">
        ← Back
    </button>

    <button class="btn btn-success">
        🚀 Analyze Founder
    </button>

</div>

</form>

<script src="{{ url_for('static', filename='js/assessment.js') }}"></script>

{% endblock %}
