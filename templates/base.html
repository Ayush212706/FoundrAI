<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}FoundrAI{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary shadow-sm">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-4" href="/">
            🚀 FoundrAI
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item me-2">

                    <a class="nav-link" href="/">
                        <i class="bi bi-house-door-fill"></i>
                        Home
                    </a>

                </li>

                <li class="nav-item me-2">

                    <a class="nav-link" href="/assessment">
                        <i class="bi bi-clipboard-data-fill"></i>
                        Assessment
                    </a>

                </li>

                <li class="nav-item me-2">

                    <a class="nav-link" href="/chat">
                        <i class="bi bi-robot"></i>
                        AI Co-Founder
                    </a>

                </li>

                <li class="nav-item me-2">

                    <a class="nav-link" href="/dashboard">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>

                </li>

                <li class="nav-item me-2">

                    <a class="nav-link" href="/report">
                        <i class="bi bi-file-earmark-pdf-fill"></i>
                        Reports
                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-primary px-3" href="/login">
                        <i class="bi bi-person-circle"></i>
                        Login
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container-fluid px-4 py-4">

    {% block content %}

    {% endblock %}

</div>

<footer class="border-top border-secondary mt-5">

    <div class="container py-3">

        <div class="row">

            <div class="col-md-6">

                <h5 class="fw-bold">

                    🚀 FoundrAI

                </h5>

                <p class="text-secondary">

                    Your Permanent AI Startup Co-Founder

                </p>

            </div>

            <div class="col-md-6 text-md-end">

                <p class="text-secondary mb-1">

                    Version 1.0 MVP

                </p>

                <p class="text-secondary">

                    © 2026 FoundrAI

                </p>

            </div>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}

{% endblock %}

</body>

</html>
