<!DOCTYPE html>
<html>

<head>

    <title>FoundrAI Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <h1>🤖 FoundrAI AI Chat</h1>

    <form method="POST">

        <textarea
            class="form-control mb-3"
            rows="5"
            name="question"
            placeholder="Ask FoundrAI anything..."
            required></textarea>

        <button class="btn btn-primary">

            Ask AI

        </button>

    </form>

    {% if answer %}

    <div class="card mt-5">

        <div class="card-body">

            <pre style="white-space:pre-wrap;">{{ answer }}</pre>

        </div>

    </div>

    {% endif %}

</div>

</body>

</html>
