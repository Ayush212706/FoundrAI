<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Founder Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h1>Founder Dashboard</h1>

<hr>

<div class="card p-4">

<h3>{{ founder.name }}</h3>

<p><strong>Age:</strong> {{ founder.age }}</p>

<p><strong>Education:</strong> {{ founder.education }}</p>

<p><strong>Occupation:</strong> {{ founder.occupation }}</p>

<hr>

<h2 class="text-success">

Founder Score

{{ founder.score }}/100

</h2>

</div>

</div>

</body>

</html>
